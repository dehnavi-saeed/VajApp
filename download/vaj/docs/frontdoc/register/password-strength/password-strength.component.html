<!-- Password Strength Meter -->
<div class="vaj-strength-root" dir="rtl">
  <!-- ── Strength Bar ── -->
  <div class="vaj-strength-bar" role="progressbar" [attr.aria-valuenow]="strengthInfo().score" aria-valuemin="0" aria-valuemax="5">
    @for (seg of [0,1,2,3,4]; track seg) {
      <div
        class="vaj-strength-segment"
        [class.filled]="seg < strengthInfo().score"
        [style.backgroundColor]="seg < strengthInfo().score ? strengthInfo().color : ''"
      ></div>
    }
  </div>

  <!-- ── Strength Label ── -->
  <div class="vaj-strength-label" [style.color]="strengthInfo().color">
    {{ strengthInfo().label }}
  </div>

  <!-- ── Requirements Checklist ── -->
  <ul class="vaj-req-list">
    @for (req of requirements(); track req.label) {
      <li class="vaj-req-item" [class.met]="req.met">
        <span class="vaj-req-icon" [class.check-bounce]="req.met">
          @if (req.met) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-check"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              class="lucide lucide-circle"
            >
              <circle cx="12" cy="12" r="10"></circle>
            </svg>
          }
        </span>
        <span class="vaj-req-text">{{ req.label }}</span>
      </li>
    }
  </ul>
</div>
