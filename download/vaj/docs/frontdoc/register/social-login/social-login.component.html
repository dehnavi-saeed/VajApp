<!-- Social Login section: divider + Google button (UI only, no real auth) -->
<section class="vaj-social-login w-full flex flex-col items-center gap-5">
  <!-- ─── Divider: "───── یا ثبت‌نام با ─────" ─── -->
  <div class="vaj-divider flex w-full items-center gap-3" aria-hidden="true">
    <span class="vaj-divider__line flex-1"></span>
    <span class="vaj-divider__text text-sm whitespace-nowrap" style="color: rgba(255,255,255,0.35)">
      یا ثبت‌نام با
    </span>
    <span class="vaj-divider__line flex-1"></span>
  </div>

  <!-- ─── Google Register Button ─── -->
  <button
    type="button"
    class="vaj-google-btn w-full flex items-center justify-center gap-3"
    [class.vaj-google-btn--disabled]="disabled()"
    (click)="onGoogleClick()"
    [disabled]="disabled()"
    aria-label="ثبت‌نام با گوگل"
  >
    <!-- Google "G" multi-color logo (inline SVG) -->
    <svg
      class="vaj-google-logo flex-shrink-0"
      width="20"
      height="20"
      viewBox="0 0 48 48"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <!-- Blue -->
      <path
        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
        fill="#4285F4"
      />
      <!-- Green -->
      <path
        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
        fill="#34A853"
      />
      <!-- Yellow -->
      <path
        d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"
        fill="#FBBC05"
      />
      <!-- Red -->
      <path
        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
        fill="#EA4335"
      />
    </svg>

    <span class="vaj-google-btn__label text-sm font-medium">
      ثبت‌نام با گوگل
    </span>
  </button>
</section>
